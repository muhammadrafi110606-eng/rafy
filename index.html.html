<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Pusat Informasi Zakat Islam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b2a1f 0%, #1a4a33 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 248, 235, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px #d4b68a inset;
      padding: 24px 20px 30px;
      border: 1px solid #e6d5b8;
    }

    .page {
      display: block;
      animation: fadeUp 0.4s ease;
    }
    .page.hidden {
      display: none;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== HALAMAN AWAL ===== */
    .welcome-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1e3d2e;
      text-shadow: 2px 2px 0 #e9d6b0;
      letter-spacing: -0.3px;
      line-height: 1.3;
      margin-bottom: 12px;
      text-align: center;
    }
    .welcome-title i {
      color: #c29a4b;
      margin-right: 6px;
    }
    .welcome-title span {
      display: block;
      font-size: 2rem;
      color: #2d5a3f;
      margin-top: 2px;
    }

    .hero-image {
      display: flex;
      justify-content: center;
      margin: 12px 0 16px;
    }
    .hero-image img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 120px 120px 60px 60px;
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.3);
      border: 4px solid #f3e3c9;
      object-fit: cover;
      aspect-ratio: 1/1;
      background: #d8c7a8;
    }

    .description-box {
      background: rgba(30, 61, 46, 0.08);
      padding: 18px 16px;
      border-radius: 40px 12px 40px 12px;
      border-left: 6px solid #b48b44;
      margin: 16px 0 24px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }
    .description-box p {
      font-size: 1rem;
      font-weight: 500;
      color: #1f3f2b;
      line-height: 1.6;
      text-align: center;
    }
    .description-box i {
      color: #b48b44;
      margin: 0 4px;
    }

    .btn-primary {
      background: #2d5a3f;
      border: none;
      color: #fef7e9;
      font-weight: 700;
      font-size: 1.4rem;
      padding: 18px 28px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 10px 0 #143323, 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.08s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px solid #e9d6b0;
    }
    .btn-primary:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #143323;
    }
    .btn-primary i {
      font-size: 1.6rem;
      color: #f5d48a;
    }

    /* ===== HALAMAN MATERI ===== */
    .materi-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 3px dashed #b48b44;
    }
    .materi-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3d2e;
      text-shadow: 1px 1px 0 #dac29c;
      flex: 1;
      line-height: 1.2;
    }
    .materi-header h2 i {
      color: #b48b44;
      margin-right: 6px;
    }
    .btn-back {
      background: #5f3f1e;
      border: none;
      color: #fef3df;
      width: 50px;
      height: 50px;
      border-radius: 30px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #2f1f0e;
      transition: 0.08s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #dabf95;
    }
    .btn-back:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #2f1f0e;
    }

    .materi-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .materi-card {
      background: #fcf6ea;
      border-radius: 28px;
      padding: 14px 18px 16px;
      box-shadow: 0 8px 0 #aa8b62, 0 10px 20px rgba(0, 0, 0, 0.15);
      border: 2px solid #dac29c;
      transition: 0.2s;
      cursor: pointer;
    }
    .materi-card:active {
      transform: scale(0.98);
    }
    .materi-card h3 {
      font-size: 1.35rem;
      color: #1e3d2e;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .materi-card h3 i {
      color: #b48b44;
      font-size: 1.4rem;
    }
    .materi-card p {
      color: #2c4d38;
      font-weight: 500;
      padding-left: 6px;
      font-size: 0.92rem;
    }

    /* ===== HALAMAN DETAIL ===== */
    .detail-container {
      background: #fcf6ea;
      border-radius: 32px;
      padding: 20px 18px 24px;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
      border: 2px solid #decbad;
    }
    .detail-container h2 {
      font-size: 1.8rem;
      color: #1e3d2e;
      border-left: 10px solid #b48b44;
      padding-left: 16px;
      margin-bottom: 16px;
    }

    /* GAMBAR LEBIH KECIL */
    .detail-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 14px 0 16px;
    }
    .detail-gallery img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 20px 8px 20px 8px;
      border: 2px solid #d6b68b;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
      background: #ccb693;
      flex-shrink: 0;
    }

    .detail-text {
      background: #ebddc8;
      padding: 18px 16px;
      border-radius: 30px 8px 30px 8px;
      margin: 16px 0 14px;
      border-left: 6px solid #9e7a4a;
      line-height: 2;
      color: #1f3526;
      font-size: 0.98rem;
      box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.1);
    }
    .detail-text strong {
      color: #4f2f12;
      font-weight: 700;
    }
    .detail-text .highlight {
      background: #d9c094;
      padding: 0 8px;
      border-radius: 30px;
      color: #1f3d28;
    }
    .detail-text ul {
      padding-left: 20px;
      margin: 6px 0;
    }
    .detail-text ul li {
      margin-bottom: 3px;
    }

    .btn-back-detail {
      background: #6f4a27;
      border: none;
      color: #fef3df;
      padding: 16px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 7px 0 #3f2a14;
      transition: 0.08s linear;
      border: 2px solid #d6b68b;
      margin-top: 10px;
    }
    .btn-back-detail:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #3f2a14;
    }
    .btn-back-detail i {
      font-size: 1.6rem;
    }

    .footer-note {
      text-align: center;
      margin-top: 12px;
      font-size: 0.75rem;
      color: #5a6b4b;
      opacity: 0.8;
    }

    @media (max-width: 420px) {
      .app-container { padding: 16px; }
      .welcome-title { font-size: 1.4rem; }
      .materi-header h2 { font-size: 1.2rem; }
      .detail-gallery img { width: 65px; height: 65px; }
    }
  </style>
</head>
<body>
<div class="app-container" id="app">

  <!-- HALAMAN AWAL -->
  <div id="page-home" class="page">
    <div class="welcome-title">
      <i class="fas fa-mosque"></i> Selamat Datang di<br />
      <span>Web Pusat Informasi Zakat Islam</span>
    </div>
    <div class="hero-image">
      <img src="pusat.png"
           alt="Ilustrasi kebingungan tentang zakat" />
    </div>
    <div class="description-box">
      <p><i class="fas fa-hand-holding-heart"></i> Zakat itu wajib, tapi masih banyak yang bingung: <strong>kapan, berapa, dan bagaimana?</strong> <i class="fas fa-arrow-right"></i> Yuk, pahami dengan santai & jelas di sini! <i class="fas fa-gem" style="color:#b48b44;"></i></p>
    </div>
    <button class="btn-primary" id="btn-belajar">
      <i class="fas fa-book-open"></i> Belajar Zakat
    </button>
    <div class="footer-note">— pintu pahala menanti —</div>
  </div>

  <!-- HALAMAN MATERI -->
  <div id="page-materi" class="page hidden">
    <div class="materi-header">
      <h2><i class="fas fa-graduation-cap"></i> Pusat Informasi Zakat Islam</h2>
      <button class="btn-back" id="btn-back-home"><i class="fas fa-arrow-left"></i></button>
    </div>
    <div class="materi-list" id="materiList"></div>
    <div style="margin-top: 14px; text-align: center; color: #344e37; font-weight: 500;">
      <i class="fas fa-chevron-down"></i> klik materi untuk detail
    </div>
  </div>

  <!-- HALAMAN DETAIL -->
  <div id="page-detail" class="page hidden">
    <div class="detail-container" id="detailContainer"></div>
    <button class="btn-back-detail" id="btn-back-materi"><i class="fas fa-arrow-left"></i> Kembali ke Materi</button>
  </div>

</div>

<script>
  (function() {
    // ===== 5 MATERI DENGAN ISI PANJANG =====
    const materiData = {
      1: {
        title: 'Zakat Fitrah',
        icon: 'fa-scale-balanced',
        desc: 'Wajib setiap muslim di bulan Ramadhan, berupa makanan pokok.',
        images: [
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect x=%2220%22 y=%2230%22 width=%2260%22 height=%2230%22 rx=%228%22 fill=%22%23c49a6c%22/%3E%3Crect x=%2235%22 y=%2240%22 width=%2230%22 height=%2210%22 fill=%22%23eace9f%22/%3E%3Ctext x=%2218%22 y=%2220%22 font-size=%2220%22 fill=%22%235d3a1a%22%3E🌾%3C/text%3E%3C/svg%3E',
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2240%22 r=%2228%22 fill=%22%23f3d37c%22/%3E%3Ccircle cx=%2238%22 cy=%2232%22 r=%225%22 fill=%22%23b37b3a%22/%3E%3Ccircle cx=%2262%22 cy=%2232%22 r=%225%22 fill=%22%23b37b3a%22/%3E%3Cpath d=%22M35 50 Q50 66, 65 50%22 stroke=%22%23945f2c%22 stroke-width=%226%22 fill=%22none%22/%3E%3C/svg%3E',
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect x=%2225%22 y=%2230%22 width=%2250%22 height=%2250%22 rx=%2212%22 fill=%22%23cfb27c%22/%3E%3Crect x=%2230%22 y=%2240%22 width=%2240%22 height=%2210%22 fill=%22%23a77b44%22/%3E%3Crect x=%2230%22 y=%2255%22 width=%2240%22 height=%2210%22 fill=%22%23a77b44%22/%3E%3Ctext x=%2232%22 y=%2275%22 font-size=%2220%22 fill=%22%233d2b14%22%3E🍚%3C/text%3E%3C/svg%3E'
        ],
        content: `
          <strong>🌙 Pengertian Zakat Fitrah</strong><br>
          Zakat Fitrah adalah zakat yang wajib dikeluarkan oleh setiap muslim, baik laki-laki maupun perempuan, tua maupun muda, merdeka maupun budak, pada bulan Ramadhan hingga sebelum pelaksanaan shalat Idul Fitri. Zakat ini disebut "fitrah" karena berkaitan dengan fitrah manusia dan juga karena dikeluarkan pada saat berbuka puasa (fitr).<br><br>

          <strong>📜 Dasar Hukum</strong><br>
          Zakat Fitrah diwajibkan pada tahun kedua Hijriyah, bertepatan dengan diwajibkannya puasa Ramadhan. Dasar hukumnya adalah hadits dari Ibnu Umar radhiyallahu 'anhuma, ia berkata: <span class="highlight">"Rasulullah shallallahu 'alaihi wasallam mewajibkan zakat fitrah sebanyak satu sha' kurma atau satu sha' gandum atas setiap budak, orang merdeka, laki-laki, perempuan, anak kecil, dan orang dewasa dari kalangan kaum muslimin."</span> (HR. Bukhari & Muslim).<br><br>

          <strong>📏 Kadar Zakat Fitrah</strong><br>
          Kadar zakat fitrah adalah satu sha' (sekitar 2,5 kg atau 3,5 liter) dari makanan pokok yang biasa dikonsumsi di suatu daerah. Di Indonesia, makanan pokok yang umum digunakan adalah beras. Namun, boleh juga menggunakan gandum, kurma, atau makanan pokok lainnya sesuai dengan kebiasaan setempat.<br><br>

          <strong>👥 Penerima Zakat Fitrah</strong><br>
          Zakat Fitrah diberikan kepada delapan golongan yang berhak menerima zakat (asnaf), sebagaimana disebutkan dalam Al-Qur'an surat At-Taubah ayat 60. Utamanya, zakat fitrah diberikan kepada fakir miskin agar mereka juga dapat merayakan Idul Fitri dengan gembira dan tidak kelaparan di hari raya.<br><br>

          <strong>⏰ Waktu Pengeluaran</strong><br>
          Waktu pengeluaran zakat fitrah terbagi menjadi beberapa tingkatan:<br>
          <ul>
            <li><strong>Waktu utama:</strong> dikeluarkan sejak terbenamnya matahari pada malam Idul Fitri hingga sebelum shalat Id.</li>
            <li><strong>Waktu wajib:</strong> saat matahari terbenam di akhir bulan Ramadhan (malam 1 Syawal).</li>
            <li><strong>Waktu sunnah:</strong> boleh dikeluarkan sejak awal Ramadhan.</li>
            <li><strong>Waktu makruh:</strong> ditunda setelah shalat Id namun masih di hari Id.</li>
            <li><strong>Waktu haram (dosa):</strong> dikeluarkan setelah hari Id (tanggal 2 Syawal ke atas), kecuali ada uzur.</li>
          </ul><br>

          <strong>💡 Hikmah Zakat Fitrah</strong><br>
          Zakat Fitrah memiliki banyak hikmah, di antaranya:<br>
          <ul>
            <li><strong>Mensucikan jiwa</strong> dari perbuatan sia-sia dan perkataan kotor selama berpuasa.</li>
            <li><strong>Menutupi kekurangan</strong> dalam ibadah puasa yang mungkin tidak sempurna.</li>
            <li><strong>Membahagiakan fakir miskin</strong> di hari raya agar mereka juga bisa merasakan kebahagiaan.</li>
            <li><strong>Melatih kepedulian sosial</strong> dan memperkuat ukhuwah Islamiyah.</li>
            <li><strong>Menumbuhkan rasa syukur</strong> atas nikmat yang telah diberikan Allah.</li>
          </ul><br>

          <strong>⚠️ Catatan Penting</strong><br>
          Zakat Fitrah tidak boleh diganti dengan uang tunai menurut mayoritas ulama (mazhab Syafi'i, Maliki, dan Hanbali). Namun, mazhab Hanafi memperbolehkan penggantian dengan nilai uang yang setara. Yang lebih utama adalah mengikuti ketentuan yang berlaku di masyarakat setempat dan tetap mengutamakan makanan pokok.
        `
      },
      2: {
        title: 'Zakat Mal (Harta)',
        icon: 'fa-coins',
        desc: 'Zakat atas harta kekayaan seperti emas, perak, uang, dan perniagaan.',
        images: [
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2235%22 cy=%2250%22 r=%2220%22 fill=%22%23d4a74b%22/%3E%3Ccircle cx=%2265%22 cy=%2250%22 r=%2220%22 fill=%22%23d4a74b%22/%3E%3Ctext x=%2222%22 y=%2230%22 font-size=%2222%22 fill=%22%235d3a1a%22%3E💰%3C/text%3E%3C/svg%3E',
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect x=%2230%22 y=%2235%22 width=%2240%22 height=%2230%22 rx=%228%22 fill=%22%23dbb067%22/%3E%3Ctext x=%2238%22 y=%2258%22 font-size=%2226%22 fill=%22%233d2b14%22%3E💎%3C/text%3E%3C/svg%3E',
          'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect x=%2225%22 y=%2230%22 width=%2250%22 height=%2240%22 rx=%2210%22 fill=%22%23a77b44%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2212%22 fill=%22%23f3d37c%22/%3E%3Ctext x=%2218%22 y=%2220%22 font-size=%2222%22 fill=%22%235d3a1a%22%3E🏦%3C/text%3E%3C/svg%3E'
        ],
        content: `
          <strong>📊 Pengertian Zakat Mal</strong><br>
          Zakat Mal (zakat harta) adalah zakat yang dikenakan atas harta kekayaan yang dimiliki oleh seorang muslim yang telah memenuhi syarat-syarat tertentu. Kata "mal" secara bahasa berarti harta benda, dan dalam konteks zakat, mencakup berbagai jenis harta seperti emas, perak, uang, hasil pertanian, hasil perniagaan, peternakan, dan hasil tambang.<br><br>

          <strong>📜 Dasar Hukum</strong><br>
          Zakat Mal diwajibkan berdasarkan Al-Qur'an, Sunnah, dan ijma' ulama. Firman Allah dalam QS. At-Taubah ayat 103: <span class="highlight">"Ambillah zakat dari sebagian harta mereka, dengan zakat itu kamu membersihkan dan mensucikan mereka."</span> Dan dalam QS. Adz-Dzariyat ayat 19: <span class="highlight">"Dan pada harta-harta mereka ada hak untuk orang miskin yang meminta dan orang miskin yang tidak meminta."</span><br><br>

          <strong>📏 Syarat Wajib Zakat Mal</strong><br>
          Ada beberapa syarat yang harus dipenuhi agar zakat mal wajib ditunaikan:<br>
          <ul>
            <li><strong>Islam:</strong> Pemilik harta beragama Islam.</li>
            <li><strong>Merdeka:</strong> Bukan budak atau hamba sahaya.</li>
            <li><strong>Milik sempurna:</strong> Harta tersebut dimiliki secara penuh dan sah.</li>
            <li><strong>Mencapai nisab:</strong> Jumlah harta telah mencapai batas minimal tertentu.</li>
            <li><strong>Mencapai haul:</strong> Harta telah dimiliki selama satu tahun hijriah (kecuali untuk pertanian dan rikaz).</li>
            <li><strong>Bebas dari hutang:</strong> Harta tersebut tidak digunakan untuk membayar hutang yang jatuh tempo.</li>
          </ul><br>

          <strong>💰 Jenis-Jenis Harta yang Wajib Dizakati</strong><br>
          <ul>
            <li><strong>Emas dan Perak:</strong> Nisab emas 85 gram, nisab perak 595 gram, kadar 2,5%.</li>
            <li><strong>Uang dan Simpanan:</strong> Diqiyaskan dengan emas, nisab setara 85 gram emas, kadar 2,5%.</li>
            <li><strong>Perniagaan:</strong> Nisab setara 85 gram emas, kadar 2,5% dari total nilai barang dagangan.</li>
            <li><strong>Pertanian:</strong> Nisab 653 kg gabah, kadar 5% (irigasi berbayar) atau 10% (alami).</li>
            <li><strong>Peternakan:</strong> Nisab bervariasi (unta, sapi, kambing), kadar berbeda-beda.</li>
            <li><strong>Rikaz (harta temuan):</strong> Kadar 20% (1/5) dari total temuan.</li>
          </ul><br>

          <strong>⏰ Waktu Pengeluaran</strong><br>
          Waktu pengeluaran zakat mal adalah ketika harta telah mencapai nisab dan haul (satu tahun). Namun, untuk pertanian, zakat dikeluarkan saat panen. Untuk rikaz, zakat dikeluarkan saat menemukan harta tersebut.<br><br>

          <strong>💡 Hikmah Zakat Mal</strong><br>
          <ul>
            <li><strong>Membersihkan harta</strong> dari hak orang lain yang bercampur di dalamnya.</li>
            <li><strong>Mensucikan jiwa</strong> dari sifat kikir dan cinta dunia yang berlebihan.</li>
            <li><strong>Mewujudkan keadilan sosial</strong> dan mengurangi kesenjangan ekonomi.</li>
            <li><strong>Melatih kedermawanan</strong> dan kepedulian terhadap sesama.</li>
            <li><strong>Menumbuhkan rasa syukur</strong> dan keyakinan bahwa rezeki datang dari Allah.</li>
          </ul><br>

          <strong>⚠️ Perbedaan Pendapat Ulama</strong><br>
          Terdapat perbedaan pendapat mengenai beberapa hal, seperti zakat atas perhiasan yang dipakai sehari-hari, zakat profesi, dan zakat atas harta anak kecil. Namun, yang paling utama adalah mengeluarkan zakat dengan niat ikhlas karena Allah dan mengikuti pendapat yang paling kuat serta sesuai dengan kondisi masing-masing.
        `
      },
      3: {
        title: 'Zakat Pertanian',
        icon: 'fa-tractor',

    // ===== ELEMEN =====
    const pageHome = document.getElementById('page-home');

    const pageDetail = document.getElementById('page-detail');
    const materiList = document.getElementById('materiList');
    const detailContainer = document.getElementById('detailContainer');

    const btnBelajar = document.getElementById('btn-belajar');
    const btnBackHome = document.getElementById('btn-back-home');
    const btnBackMateri = document.getElementById('btn-back-materi');

    // ===== FUNGSI NAVIGASI =====
    function showPage(pageId) {
      pageHome.classList.add('hidden');
      pageMateri.classList.add('hidden');
      pageDetail.classList.add('hidden');
      if (pageId === 'home') pageHome.classList.remove('hidden');
      else if (pageId === 'materi') pageMateri.classList.remove('hidden');
      else if (pageId === 'detail') pageDetail.classList.remove('hidden');
    }

    // ===== RENDER DAFTAR MATERI =====
    function renderMateriList() {
      let html = '';
      for (const [key, data] of Object.entries(materiData)) {
        html += `
          <div class="materi-card" data-materi="${key}">
            <h3><i class="fas ${data.icon}"></i> ${data.title}</h3>
            <p>${data.desc}</p>
          </div>
        `;
      }
      materiList.innerHTML = html;

      document.querySelectorAll('.materi-card').forEach(card => {
        card.addEventListener('click', function() {
          const id = this.dataset.materi;
          renderDetail(id);
        });
      });
    }

    // ===== RENDER DETAIL MATERI =====
    function renderDetail(materiId) {
      const data = materiData[materiId];
      if (!data) return;

      let imgHtml = data.images.map(src =>
        `<img src="${src}" alt="ilustrasi ${data.title}" />`
      ).join('');

      detailContainer.innerHTML = `
        <h2><i class="fas ${data.icon}" style="color:#b48b44;"></i> ${data.title}</h2>
        <div class="detail-gallery">${imgHtml}</div>
        <div class="detail-text">${data.content}</div>
      `;
      showPage('detail');
    }

    // ===== EVENT =====
    btnBelajar.addEventListener('click', () => showPage('materi'));
    btnBackHome.addEventListener('click', () => showPage('home'));
    btnBackMateri.addEventListener('click', () => showPage('materi'));

    // ===== INIT =====
    renderMateriList();
    showPage('home');
  })();
